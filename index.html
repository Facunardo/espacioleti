<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espacio Leti — Lic. Leticia Maurente, Psicóloga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE5D4;
    --green-deep: #1B4D35;
    --green-mid: #2D6A4F;
    --green-soft: #52B788;
    --green-pale: #D8F3DC;
    --sage: #8FAF8A;
    --terra: #C17F5A;
    --terra-pale: #F0E0D0;
    --brown: #5C3D2E;
    --text: #2C2C2C;
    --text-light: #6B6B6B;
    --white: #FDFAF6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── TYPOGRAPHY ─── */
  .display { font-family: 'Cormorant Garamond', Georgia, serif; }

  h1, h2, h3 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(43, 106, 79, 0.1);
    transition: all 0.3s ease;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 500;
    color: var(--green-deep); letter-spacing: 0.02em;
  }
  .nav-logo span { color: var(--terra); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-size: 0.85rem; font-weight: 400; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--green-deep);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--terra); }
  .nav-cta {
    background: var(--green-deep); color: var(--white) !important;
    padding: 10px 22px; border-radius: 100px;
    font-size: 0.82rem !important; letter-spacing: 0.05em !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--green-mid) !important; color: var(--white) !important; }
</style>
</head>
<body>
<p style="padding:100px;text-align:center;font-size:20px">Cargando...</p>
</body>
</html>
