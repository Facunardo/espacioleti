<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espacio Leti — Lic. Leticia Maurente, Psicóloga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --cream: #F5F0E8;
    --cream-dark: #EDE5D4;
    --green-deep: #1B4D35;
    --green-mid: #2D6A4F;
    --green-soft: #52B788;
    --green-pale: #D8F3DC;
    --sage: #8FAF8A;
    --terra: #C17F5A;
    --terra-pale: #F0E0D0;
    --brown: #5C3D2E;
    --text: #2C2C2C;
    --text-light: #6B6B6B;
    --white: #FDFAF6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ─── TYPOGRAPHY ─── */
  .display { font-family: 'Cormorant Garamond', Georgia, serif; }

  h1, h2, h3 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(43, 106, 79, 0.1);
    transition: all 0.3s ease;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 500;
    color: var(--green-deep); letter-spacing: 0.02em;
  }
  .nav-logo span { color: var(--terra); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-size: 0.85rem; font-weight: 400; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--green-deep);
    text-decoration: none; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--terra); }
  .nav-cta {
    background: var(--green-deep); color: var(--white) !important;
    padding: 10px 22px; border-radius: 100px;
    font-size: 0.82rem !important; letter-spacing: 0.05em !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--green-mid) !important; color: var(--white) !important; }

  /* ─── HERO ─── */
  #hero {
    min-height: 100vh;
    display: grid; grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 80px 80px;
    position: relative; overflow: hidden;
    background: var(--cream);
  }

  .hero-blob {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.3; pointer-events: none;
  }
  .blob-1 { width: 600px; height: 600px; background: var(--green-pale); top: -100px; right: 0; }
  .blob-2 { width: 400px; height: 400px; background: var(--terra-pale); bottom: -50px; left: 100px; }

  .hero-text { position: relative; z-index: 2; padding-right: 60px; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--green-mid);
    margin-bottom: 28px;
  }
  .hero-eyebrow::before {
    content: ''; display: block; width: 32px; height: 1px; background: var(--green-mid);
  }

  .hero-title {
    font-size: clamp(3.2rem, 5vw, 5rem);
    font-weight: 300; line-height: 1.08;
    color: var(--green-deep); margin-bottom: 10px;
  }
  .hero-title em { font-style: italic; color: var(--terra); }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 2.5vw, 2.2rem);
    font-weight: 300; font-style: italic;
    color: var(--green-mid); margin-bottom: 32px; line-height: 1.3;
  }

  .hero-desc {
    font-size: 1rem; line-height: 1.75;
    color: var(--text-light); max-width: 460px; margin-bottom: 48px;
  }

  .hero-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 48px; }
  .tag {
    font-size: 0.8rem; font-weight: 400; letter-spacing: 0.04em;
    padding: 7px 16px; border-radius: 100px;
    background: var(--green-pale); color: var(--green-deep);
    border: 1px solid rgba(43, 106, 79, 0.15);
  }

  .hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--green-deep); color: var(--white);
    padding: 16px 32px; border-radius: 100px;
    font-size: 0.9rem; font-weight: 500;
    text-decoration: none; transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(27, 77, 53, 0.25);
  }

  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent; color: var(--green-deep);
    padding: 16px 32px; border-radius: 100px;
    border: 1.5px solid var(--green-deep);
    font-size: 0.9rem; font-weight: 500;
    text-decoration: none; transition: all 0.25s;
  }
</style>
</head>
<body>
<script>window.location.href="https://facunardo.github.io/espacioleti/landing.html";</script>
</body>
</html>
